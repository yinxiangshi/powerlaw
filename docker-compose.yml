services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: powerlaw
      POSTGRES_USER: powerlaw
      POSTGRES_PASSWORD: powerlaw
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerlaw -d powerlaw"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
